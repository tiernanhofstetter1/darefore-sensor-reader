<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Darefore Sensor Reader</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Darefore Sensor Reader</h1>
    <div id="status">disconnected</div>
    <div class="controls">
      <button id="connectBtn">Connect</button>
      <button id="resetLeanBtn">Reset Lean</button>
      <button id="clearBtn">Clear</button>
      <button id="downloadBtn">Download CSV</button>
      <label><input type="checkbox" id="rawToggle" /> show raw notifications</label>
      <label>
        display rate
        <select id="displayRateSelect">
          <option value="0" selected>every sample</option>
          <option value="200">5/sec</option>
          <option value="500">2/sec</option>
          <option value="1000">1/sec</option>
          <option value="2000">every 2s</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <pre id="log"></pre>
    <pre id="rawLog" class="hidden"></pre>
  </main>

  <script src="app.js"></script>
</body>
</html>
